# ============================================================
# WtFutuCore 策略核心配置
# ============================================================
# 
# 配置结构:
#   config.yaml      - 策略核心配置 (本文件)
#   coordinator.yaml - 模块参数 + 处理流程
#
# 配置优先级:
#   1. 默认值 (代码定义)
#   2. coordinator.yaml (模块参数)
#   3. config.yaml (覆盖 coordinator)
#
# 命名规范: 统一使用 camelCase
# ============================================================

# ============================================================
# 基础数据文件
# ============================================================
basefiles:
  session: ../common/sessions.json
  commodity: ../common/commodities.json
  contract: ../common/contracts.json
  holiday: ../common/holidays.json

# ============================================================
# 行情源配置
# ============================================================
parsers:
  - active: true
    id: parser_ctp
    module: ParserCTP
    front: tcp://182.254.243.31:30011
    userid: "048363"
    password: "clx@#10300"
    brokerid: "9999"

# ============================================================
# 交易通道配置
# ============================================================
traders:
  - active: true
    id: trader_ctp
    module: TraderCTP
    savedata: true
    riskmon:
      active: true
      policy:
        default:
          cancelStatTimespan: 10
          cancelTimesBoundary: 20
          cancelTotalLimits: 470
          orderStatTimespan: 10
          orderTimesBoundary: 20
    front: tcp://182.254.243.31:30001
    broker: '9999'
    appid: simnow_client_test
    authcode: '0000000000000000'
    user: "048363"
    pass: "clx@#10300"
    quick: true

# ============================================================
# 环境配置
# ============================================================
env:
  name: uft
  product:
    session: TRADING

# ============================================================
# 数据存储配置
# ============================================================
data:
  store:
    path: ./data/

# ============================================================
# 开平仓策略文件
# ============================================================
bspolicy: actpolicy.yaml

# ============================================================
# 策略配置 - UFT 做市策略
# ============================================================
strategies:
  uft:
    - active: true
      id: futu_mm_ag
      name: FutuStraFact.FutuMM
      trader: trader_ctp
      params:
        # ============================================================
        # 合约配置
        # ============================================================
        anchorCode: SHFE.ag2606
        contracts:
          - code: SHFE.ag2606
            maxPosition: 50
            maxDelta: 50      # 单合约 Delta 软限制（手数），用于 inventory skew 归一化
            targetPosition: 0
          - code: SHFE.ag2612
            maxPosition: 50
            maxDelta: 50      # 单合约 Delta 软限制（手数）
            targetPosition: 0
        
        # ============================================================
        # 报价参数 (Quoting)
        # ============================================================
        quoting:
          numLevels: 1
          baseSpread: 3.0
          baseQty: 3.0
          qtyDecay: 0.7
          levelStep: 1.0
        
        # ============================================================
        # 库存管理 (Inventory)
        # ============================================================
        inventory:
          maxInventory: 100.0
          skewFactor: 0.01
          maxSkew: 5.0
          hedgeRatio: 1.0
          targetInventory: 0
          stickyThreshold: 1.0
          maxPriceDeviation: 20.0
          skewSensitivity: 2.0
          aggressiveSkewThreshold: 0.5
          oneSidedThreshold: 0.8
        
        # ============================================================
        # 风险参数 (Risk)
        # ============================================================
        risk:
          deltaLimit: 5000000.0
          maxDelta: 100000000.0
          maxExposure: 300000000.0
          hedgeThreshold: 3000000.0
          maxSpreadMult: 3.0
          maxDailyLoss: -200000.0
          
          # 频率限制
          frequency:
            maxOrdersPerSec: 50
            maxCancelsPerSec: 30
            maxTradesPerSec: 20
            cooldownMs: 30000
            checkIntervalMs: 5000
            recoveryThreshold: 0.8
        
        # ============================================================
        # 收盘平仓参数 (Closeout)
        # ============================================================
        closeout:
          minutesBefore: 5
          flattenPosition: true
        
        # ============================================================
        # 性能监控参数 (Performance)
        # ============================================================
        performance:
          analyzerWindowSize: 1000
          latencyThreshold: 100000
        
        # ============================================================
        # 其他参数
        # ============================================================
        orderErrorThreshold: 3
        
        # ============================================================
        # 模块开关 (覆盖 coordinator.yaml)
        # ============================================================
        modules:
          useMarketMaking: true
          useSpreadArbitrage: false
