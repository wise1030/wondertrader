# ============================================================
# 风控参数配置文件
# 包含：组合风险、风控监控、收盘平仓、下单错误处理
# ============================================================

# ============================================================
# 组合风险参数（必须配置）
# ============================================================
deltaLimit: 5000000.0           # Delta阈值(触发价差扩大)
maxDelta: 100000000.0           # 最大Delta(硬限制)
maxExposure: 300000000.0        # 最大暴露
hedgeThreshold: 3000000.0       # 对冲触发阈值
maxSpreadMult: 3.0              # 风险时最大价差倍数
maxDailyLoss: -200000.0         # 最大日内亏损

# ============================================================
# 下单错误处理
# ============================================================
orderErrorThreshold: 3          # 触发暂停的连续下单错误次数

# ============================================================
# 收盘前平仓
# ============================================================
closeoutMinutesBefore: 5        # 收盘前多少分钟停止报价 (0=不启用)
closeoutFlattenPosition: true   # 收盘前是否平掉所有敞口

# ============================================================
# Risk Monitor 参数
# ============================================================
riskMonitor:
  maxOrdersPerSec: 50           # 每秒最大下单
  maxCancelsPerSec: 30          # 每秒最大撤单
  maxTradesPerSec: 20           # 每秒最大成交
  # 恢复机制配置
  cooldownMs: 30000             # 冷却期 (毫秒)
  checkIntervalMs: 5000         # 检查间隔 (毫秒)
  recoveryThreshold: 0.8        # 恢复阈值 (80%)

# ============================================================
# Correlation Manager 参数
# ============================================================
correlationManager:
  windowSize: 100               # 相关性计算窗口
  minCorrelation: 0.5           # 最小相关系数
  spreadZThreshold: 2.0         # 价差Z分数阈值