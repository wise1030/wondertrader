# ============================================================
# 报价参数配置文件
# 包含：合约配置、报价参数、库存管理、Alpha参数
# ============================================================

# ============================================================
# 合约配置（必须配置）
# ============================================================
contracts:
  - code: SHFE.ag2606
    # multiplier/tickSize 可选，未配置时从基础数据获取
    maxPosition: 50             # 单合约最大持仓 (手)
    maxDelta: 500000            # 单合约最大 Delta
    targetPosition: 30          # 单向持仓上限 (手)，非负数
                                # 买单：空头持仓 > targetPosition 时平空，否则开多
                                # 卖单：多头持仓 > targetPosition 时平多，否则开空
                                # 例如：设为30，当多头>30时卖单平多，空头>30时买单平空
                                # 默认0表示任何单向持仓都会触发平仓
  - code: SHFE.ag2612
    maxPosition: 50
    maxDelta: 500000
    targetPosition: 30          # 单向持仓上限

# ============================================================
# 锚定合约（必须配置）
# ============================================================
anchorCode: SHFE.ag2606

# ============================================================
# 核心报价参数（建议根据市场情况调整）
# ============================================================
numLevels: 1                    # 每边档位数
baseSpread: 3.0                 # 基础价差 (tick)
baseQty: 3.0                    # 基础量 (手)
qtyDecay: 0.7                   # 外层衰减
levelStep: 1.0                  # 档位间距 (tick)

# ============================================================
# 库存管理参数（建议根据风险偏好调整）
# ============================================================
maxInventory: 100.0             # 默认最大库存
skewFactor: 0.01                # GLFT φ系数 (库存惩罚系数)
maxSkew: 5.0                    # 最大倾斜 (tick)
hedgeRatio: 1.0                 # 对冲比例
targetInventory: 0              # 目标库存

# ============================================================
# 统一 Sticky/Skew 参数
# ============================================================
stickyThreshold: 1.0            # 价格粘性阈值(tick)
maxPriceDeviation: 20.0         # 最大价格偏离(tick)
skewSensitivity: 2.0            # Skew 非线性增强系数
aggressiveSkewThreshold: 0.5    # 激进 Skew 触发阈值 (delta利用率)
oneSidedThreshold: 0.8          # 单向报价阈值 (delta利用率)

# ============================================================
# Alpha Engine 参数（建议根据市场情况调整）
# ============================================================
alphaEngine:
  sensitivity: 0.5              # η: Alpha对价格影响
  ofiWeight: 0.4                # OFI权重
  tradeWeight: 0.3              # 交易流权重
  leadlagWeight: 0.3            # 跨品种权重
  emaFactor: 0.3                # EMA平滑因子
  strongThreshold: 0.7          # 强信号阈值
  ofiWindow: 50                 # OFI计算窗口
  tradeWindow: 100              # 交易流计算窗口