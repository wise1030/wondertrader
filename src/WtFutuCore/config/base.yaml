# ============================================================
# 基础数据文件
# ============================================================
basefiles:
  session: ../common/sessions.json
  commodity: ../common/commodities.json
  contract: ../common/contracts.json
  holiday: ../common/holidays.json

# ============================================================
# 行情源配置
# ============================================================
parsers:
  - active: true
    id: parser_ctp
    module: ParserCTP
    front: tcp://182.254.243.31:30011
    userid: "048363"
    password: "clx@#10300"
    brokerid: "9999"

# ============================================================
# 交易通道配置
# ============================================================
traders:
  - active: true
    id: trader_ctp
    module: TraderCTP
    savedata: true
    riskmon:
      active: true
      policy:
        default:
          cancel_stat_timespan: 10
          cancel_times_boundary: 20
          cancel_total_limits: 470
          order_stat_timespan: 10
          order_times_boundary: 20
    front: tcp://182.254.243.31:30001
    broker: '9999'
    appid: simnow_client_test
    authcode: '0000000000000000'
    user: "048363"
    pass: "clx@#10300"
    quick: true

# ============================================================
# 环境和数据存储
# ============================================================
env:
  name: uft
  product:
    session: TRADING

data:
  store:
    path: ./data/

# ============================================================
# 开平仓策略文件
# ============================================================
bspolicy: actpolicy.yaml