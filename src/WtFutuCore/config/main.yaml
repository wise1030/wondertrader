# ============================================================
# WtFutuCore 主配置文件
# 基于 dist/WtRunnerFutu/config.yaml 优化
# 采用分模块配置架构，支持热更新
# ============================================================

# ============================================================
# 基础数据文件
# ============================================================
basefiles:
  session: ../common/sessions.json
  commodity: ../common/commodities.json
  contract: ../common/contracts.json
  holiday: ../common/holidays.json

# ============================================================
# 行情源配置
# ============================================================
parsers:
  - active: true
    id: parser_ctp
    module: ParserCTP
    front: tcp://182.254.243.31:30011
    userid: "048363"
    password: "clx@#10300"
    brokerid: "9999"

# ============================================================
# 交易通道配置
# 两层风控架构：
#   1. 通道级风控 (traders.riskmon): 防止交易所限频，控制下单/撤单频率
#   2. 策略级风控 (strategies.riskMonitor): 策略内部风险指标监控
# ============================================================
traders:
  - active: true
    id: trader_ctp
    module: TraderCTP
    savedata: true
    riskmon:
      active: true
      policy:
        default:
          cancel_stat_timespan: 10        # 撤单统计时间窗口(秒)
          cancel_times_boundary: 20       # 时间窗口内最大撤单次数
          cancel_total_limits: 470        # 全天最大撤单次数(交易所限制)
          order_stat_timespan: 10         # 下单统计时间窗口(秒)
          order_times_boundary: 20        # 时间窗口内最大下单次数
    front: tcp://182.254.243.31:30001
    broker: '9999'
    appid: simnow_client_test
    authcode: '0000000000000000'
    user: "048363"
    pass: "clx@#10300"
    quick: true

# ============================================================
# 环境配置
# ============================================================
env:
  name: uft
  product:
    session: TRADING

# ============================================================
# 数据存储配置
# ============================================================
data:
  store:
    path: ./data/

# ============================================================
# 开平仓策略文件
# ============================================================
bspolicy: actpolicy.yaml

# ============================================================
# 策略配置 - UFT 做市策略
# ============================================================
strategies:
  uft:
    - active: true
      id: futu_mm_ag
      name: FutuStraFact.FutuMM
      trader: trader_ctp
      params:
        # ============================================================
        # 合约配置
        # ============================================================
        anchorCode: SHFE.ag2606
        contracts:
          - code: SHFE.ag2606
            maxPosition: 50
            maxDelta: 5000000
            targetPosition: 0
          - code: SHFE.ag2612
            maxPosition: 50
            maxDelta: 5000000
            targetPosition: 0
        
        # ============================================================
        # 模块开关
        # ============================================================
        useSpreadOptimizer: true
        useAutoCancel: true
        useMarketState: true
        useOrderBook: false
        useAlphaEngine: true
        useToxicityDetector: true
        useSyntheticTransaction: true
        useSpreadArbitrage: false
        usePerformanceMonitor: false
        useAdaptiveParam: false
        usePerformanceAnalyzer: false
        
        # ============================================================
        # 下单错误处理
        # ============================================================
        orderErrorThreshold: 3
        
        # ============================================================
        # 收盘前平仓
        # ============================================================
        closeoutMinutesBefore: 5
        closeoutFlattenPosition: true
        
        # ============================================================
        # 报价模块参数 (详见 modules/quoting.yaml)
        # ============================================================
        # 核心报价参数
        numLevels: 1
        baseSpread: 3.0
        baseQty: 3.0
        qtyDecay: 0.7
        levelStep: 1.0
        
        # 库存管理
        maxInventory: 100.0
        skewFactor: 0.01
        maxSkew: 5.0
        hedgeRatio: 1.0
        targetInventory: 0
        
        # Sticky/Skew 参数
        stickyThreshold: 1.0
        maxPriceDeviation: 20.0
        skewSensitivity: 2.0
        aggressiveSkewThreshold: 0.5
        oneSidedThreshold: 0.8
        
        # ============================================================
        # 风控模块参数 (详见 modules/risk.yaml)
        # ============================================================
        riskMonitor:
          maxOrdersPerSec: 50
          maxCancelsPerSec: 30
          maxTradesPerSec: 20
          cooldownMs: 30000
          checkIntervalMs: 5000
          recoveryThreshold: 0.8
        
        # 组合风险参数
        deltaLimit: 5000000.0
        maxDelta: 100000000.0
        maxExposure: 300000000.0
        hedgeThreshold: 3000000.0
        maxSpreadMult: 3.0
        maxDailyLoss: -200000.0
        
        # ============================================================
        # Alpha模块参数 (详见 modules/alpha.yaml)
        # ============================================================
        alphaEngine:
          sensitivity: 0.5
          ofiWeight: 0.4
          tradeWeight: 0.3
          leadlagWeight: 0.3
          emaFactor: 0.3
          strongThreshold: 0.7
          ofiWindow: 50
          tradeWindow: 100
        
        # ============================================================
        # 价差优化模块参数 (详见 modules/spread_optimizer.yaml)
        # ============================================================
        spreadOptimizer:
          volSensitivity: 1.0
          depthSensitivity: 0.5
          volWindow: 100
          minSpreadMult: 0.5
          phi: 0.01
          portfolioSkewWeight: 0.5
          minCorrelation: 0.5
        
        # ============================================================
        # 毒性检测模块参数 (详见 modules/toxicity.yaml)
        # ============================================================
        toxicityDetector:
          vpinThreshold: 0.7
          window: 50
          cooloffMs: 5000
        
        # ============================================================
        # 市场状态检测模块参数 (详见 modules/market_state.yaml)
        # ============================================================
        marketState:
          volThreshold: 0.003
          moveThreshold: 0.005
          spreadThreshold: 5.0
          volumeThreshold: 10.0
          lookbackTicks: 50
          cooldownTicks: 20
        
        # ============================================================
        # 自动撤单模块参数 (详见 modules/auto_cancel.yaml)
        # ============================================================
        autoCancel:
          maxAgeMs: 5000
          priceDeviation: 3.0
          cancelOnStateChange: true
          cancelOnInventoryLimit: true
          inventoryLimitCooldownMs: 2000
        
        # ============================================================
        # 相关性管理模块参数 (详见 modules/correlation.yaml)
        # ============================================================
        correlationManager:
          windowSize: 100
          minCorrelation: 0.5
          spreadZThreshold: 2.0
        
        # ============================================================
        # 综合信号融合模块参数 (详见 modules/synthetic_signal.yaml)
        # ============================================================
        syntheticTransaction:
          enabled: true
          tickWeight: 0.4
          bookWeight: 0.4
          selfTradeWeight: 0.2
          minSamples: 5
        
        # Tick推断器参数
        tickInferer:
          imbalanceWindowMs: 5000
          largeTradeThreshold: 50.0
          minConfidence: 0.3
        
        # 自身成交校准器参数
        selfTradeCalibrator:
          lookbackTrades: 50
          toxicityWindowMs: 5000
          adverseThreshold: 0.6
        
        # ============================================================
        # 跨期价差套利模块
        # ============================================================
        spreadArbitrage:
          enabled: false
          enhanceMarketMaking: true
          maxPosition: 20.0
          entryZScore: 2.0
          exitZScore: 0.5
          windowSize: 200
          # 异步套利执行器参数
          asyncExecutor:
            signalIntervalUs: 5000
            maxWaitUs: 10000
            ticksPerSignal: 5
            tickQueueSize: 1024
            orderQueueSize: 256
        
        # ============================================================
        # 自适应参数管理模块
        # ============================================================
        adaptiveParam:
          updateInterval: 100
          learningRate: 0.01
          minPhi: 0.001
          maxPhi: 0.1
        
        # ============================================================
        # 性能分析模块
        # ============================================================
        performanceAnalyzer:
          windowSize: 100
          sharpeRiskFree: 0.0
        
        # ============================================================
        # 性能监控模块
        # ============================================================
        performanceMonitor:
          latencyThreshold: 100000
        
        # ============================================================
        # 自成交防护
        # ============================================================
        selfTradePrevention:
          enabled: true
          strategy: cancelMM
          minPriceGap: 1.0
          allowSamePrice: false
          priceAdjustTicks: 1.0