# ============================================================
# 标准模式配置模板
# 适用于中等风险偏好、平衡收益场景
# ============================================================

# 使用说明：
# 1. 复制此文件到 config/ 目录并重命名为 config.yaml
# 2. 修改行情和交易通道的连接信息
# 3. 修改合约配置为实际交易的合约

# ============================================================
# 基础配置（需要修改连接信息）
# ============================================================
basefiles:
  session: ../common/sessions.json
  commodity: ../common/commodities.json
  contract: ../common/contracts.json
  holiday: ../common/holidays.json

parsers:
  - active: true
    id: parser_ctp
    module: ParserCTP
    front: tcp://your_md_front
    userid: "your_userid"
    password: "your_password"
    brokerid: "your_brokerid"

traders:
  - active: true
    id: trader_ctp
    module: TraderCTP
    savedata: true
    front: tcp://your_td_front
    broker: "your_broker"
    appid: your_appid
    authcode: "your_authcode"
    user: "your_user"
    pass: "your_pass"
    quick: true

env:
  name: uft
  product:
    session: TRADING

data:
  store:
    path: ./data/

bspolicy: actpolicy.yaml

# ============================================================
# 策略配置 - 标准模式
# ============================================================
strategies:
  uft:
    - active: true
      id: futu_mm_standard
      name: FutuStraFact.FutuMM
      trader: trader_ctp
      params:
        # 合约配置
        anchorCode: SHFE.ag2606
        contracts:
          - code: SHFE.ag2606
            maxPosition: 50
            maxDelta: 500000
          - code: SHFE.ag2612
            maxPosition: 50
            maxDelta: 500000
        
        # 核心报价参数
        numLevels: 1
        baseSpread: 3.0
        baseQty: 3.0
        qtyDecay: 0.7
        levelStep: 1.0
        
        # 库存管理
        maxInventory: 100.0
        skewFactor: 0.01
        maxSkew: 5.0
        hedgeRatio: 1.0
        targetInventory: 0
        
        # Sticky/Skew 参数
        stickyThreshold: 1.0
        maxPriceDeviation: 20.0
        skewSensitivity: 2.0
        aggressiveSkewThreshold: 0.5
        oneSidedThreshold: 0.8
        
        # Alpha Engine 参数
        alphaEngine:
          sensitivity: 0.5
          ofiWeight: 0.4
          tradeWeight: 0.3
          leadlagWeight: 0.3
          emaFactor: 0.3
          strongThreshold: 0.7
          ofiWindow: 50
          tradeWindow: 100
        
        # 组合风险参数
        deltaLimit: 5000000.0
        maxDelta: 100000000.0
        maxExposure: 300000000.0
        hedgeThreshold: 3000000.0
        maxSpreadMult: 3.0
        maxDailyLoss: -200000.0
        
        # 下单错误处理
        orderErrorThreshold: 3
        
        # 收盘前平仓
        closeoutMinutesBefore: 5
        closeoutFlattenPosition: true
        
        # Risk Monitor 参数
        riskMonitor:
          maxOrdersPerSec: 50
          maxCancelsPerSec: 30
          maxTradesPerSec: 20
          cooldownMs: 30000
          checkIntervalMs: 5000
          recoveryThreshold: 0.8
        
        # Correlation Manager 参数
        correlationManager:
          windowSize: 100
          minCorrelation: 0.5
          spreadZThreshold: 2.0
        
        # 模块开关
        useSpreadOptimizer: true
        useAutoCancel: true
        useMarketState: true
        useOrderBook: false
        useAlphaEngine: true
        useToxicityDetector: true
        usePerformanceMonitor: false
        useAdaptiveParam: false
        usePerformanceAnalyzer: false
        
        # SpreadOptimizer 参数
        spreadOptimizer:
          volSensitivity: 1.0
          depthSensitivity: 0.5
          volWindow: 100
          minSpreadMult: 0.5
          phi: 0.01
          portfolioSkewWeight: 0.5
          minCorrelation: 0.5
        
        # Toxicity Detector 参数
        toxicityDetector:
          vpinThreshold: 0.7
          window: 50
          cooloffMs: 5000
        
        # Synthetic Transaction 参数
        syntheticTransaction:
          enabled: true
          tickWeight: 0.4
          bookWeight: 0.4
          selfTradeWeight: 0.2
          minSamples: 5
          imbalanceWindowMs: 5000
          largeTradeThreshold: 50.0
          minConfidence: 0.3
          lookbackTrades: 50
          toxicityWindowMs: 5000
          adverseThreshold: 0.6
        
        # Market State Detector 参数
        marketState:
          volThreshold: 0.003
          moveThreshold: 0.005
          spreadThreshold: 5.0
          volumeThreshold: 10.0
          lookbackTicks: 50
          cooldownTicks: 20
        
        # Auto Cancel Policy 参数
        autoCancel:
          maxAgeMs: 5000
          priceDeviation: 3.0
          cancelOnStateChange: true
          cancelOnInventoryLimit: true
          inventoryLimitCooldownMs: 2000
        
        # 跨期价差套利
        spreadArbitrage:
          enabled: false
          enhanceMarketMaking: false
          maxPosition: 20.0
          entryZScore: 2.0
          exitZScore: 0.5
          windowSize: 200
        
        # 自成交防护
        selfTradePrevention:
          enabled: true
          strategy: cancelMM
          minPriceGap: 1.0
          allowSamePrice: false
          priceAdjustTicks: 1.0