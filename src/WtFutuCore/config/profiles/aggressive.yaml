# ============================================================
# 激进模式配置模板
# 适用于高风险偏好、高收益场景
# ============================================================

# 使用说明：
# 1. 复制此文件到 config/ 目录并重命名为 config.yaml
# 2. 修改行情和交易通道的连接信息
# 3. 修改合约配置为实际交易的合约

# ============================================================
# 基础配置（需要修改连接信息）
# ============================================================
basefiles:
  session: ../common/sessions.json
  commodity: ../common/commodities.json
  contract: ../common/contracts.json
  holiday: ../common/holidays.json

parsers:
  - active: true
    id: parser_ctp
    module: ParserCTP
    front: tcp://your_md_front
    userid: "your_userid"
    password: "your_password"
    brokerid: "your_brokerid"

traders:
  - active: true
    id: trader_ctp
    module: TraderCTP
    savedata: true
    front: tcp://your_td_front
    broker: "your_broker"
    appid: your_appid
    authcode: "your_authcode"
    user: "your_user"
    pass: "your_pass"
    quick: true

env:
  name: uft
  product:
    session: TRADING

data:
  store:
    path: ./data/

bspolicy: actpolicy.yaml

# ============================================================
# 策略配置 - 激进模式
# ============================================================
strategies:
  uft:
    - active: true
      id: futu_mm_aggressive
      name: FutuStraFact.FutuMM
      trader: trader_ctp
      params:
        # 合约配置
        anchorCode: SHFE.ag2606
        contracts:
          - code: SHFE.ag2606
            maxPosition: 100         # 较大仓位
            maxDelta: 1000000
          - code: SHFE.ag2612
            maxPosition: 100
            maxDelta: 1000000
        
        # 核心报价参数（激进：较小价差，较大数量）
        numLevels: 3                 # 多档位报价
        baseSpread: 2.0              # 较小价差
        baseQty: 5.0                 # 较大基础量
        qtyDecay: 0.8
        levelStep: 1.0
        
        # 库存管理（激进：宽松库存控制）
        maxInventory: 200.0          # 较大库存
        skewFactor: 0.005            # 较小库存惩罚
        maxSkew: 8.0
        hedgeRatio: 0.8
        targetInventory: 0
        
        # Sticky/Skew 参数
        stickyThreshold: 2.0         # 更大粘性
        maxPriceDeviation: 30.0
        skewSensitivity: 1.5         # 较低的skew敏感度
        aggressiveSkewThreshold: 0.6 # 更晚触发激进skew
        oneSidedThreshold: 0.9
        
        # Alpha Engine 参数
        alphaEngine:
          sensitivity: 0.8           # 较高的alpha敏感度
          ofiWeight: 0.4
          tradeWeight: 0.3
          leadlagWeight: 0.3
          emaFactor: 0.2
          strongThreshold: 0.5       # 更低的强信号阈值
          ofiWindow: 30              # 更短的窗口
          tradeWindow: 50
        
        # 组合风险参数（激进：宽松限制）
        deltaLimit: 10000000.0       # 较大delta限制
        maxDelta: 200000000.0
        maxExposure: 500000000.0
        hedgeThreshold: 5000000.0
        maxSpreadMult: 5.0           # 较大的价差倍数
        maxDailyLoss: -500000.0      # 较大的日亏损限制
        
        # 下单错误处理
        orderErrorThreshold: 5       # 更多错误容忍
        
        # 收盘前平仓
        closeoutMinutesBefore: 3     # 更晚开始平仓
        closeoutFlattenPosition: true
        
        # Risk Monitor 参数（激进：宽松流控）
        riskMonitor:
          maxOrdersPerSec: 100       # 较高下单频率
          maxCancelsPerSec: 60
          maxTradesPerSec: 40
          cooldownMs: 15000          # 较短冷却期
          checkIntervalMs: 3000
          recoveryThreshold: 0.9     # 更高的恢复阈值
        
        # Correlation Manager 参数
        correlationManager:
          windowSize: 100
          minCorrelation: 0.5
          spreadZThreshold: 2.0
        
        # 模块开关
        useSpreadOptimizer: true
        useAutoCancel: true
        useMarketState: true
        useOrderBook: false
        useAlphaEngine: true
        useToxicityDetector: true
        usePerformanceMonitor: false
        useAdaptiveParam: true       # 启用自适应参数
        usePerformanceAnalyzer: true
        
        # SpreadOptimizer 参数（激进）
        spreadOptimizer:
          volSensitivity: 0.8        # 较低波动率敏感度
          depthSensitivity: 0.5
          volWindow: 50              # 更短窗口
          minSpreadMult: 0.3         # 较低最小价差
          phi: 0.005                 # 更小库存惩罚
          portfolioSkewWeight: 0.5
          minCorrelation: 0.5
        
        # Toxicity Detector 参数（激进）
        toxicityDetector:
          vpinThreshold: 0.8         # 更高的毒性阈值
          window: 50
          cooloffMs: 3000            # 更短冷却时间
        
        # Synthetic Transaction 参数
        syntheticTransaction:
          enabled: true
          tickWeight: 0.4
          bookWeight: 0.4
          selfTradeWeight: 0.2
          minSamples: 5
          imbalanceWindowMs: 5000
          largeTradeThreshold: 50.0
          minConfidence: 0.3
          lookbackTrades: 50
          toxicityWindowMs: 5000
          adverseThreshold: 0.6
        
        # Market State Detector 参数
        marketState:
          volThreshold: 0.005        # 更高的波动率阈值
          moveThreshold: 0.008
          spreadThreshold: 5.0
          volumeThreshold: 10.0
          lookbackTicks: 50
          cooldownTicks: 15
        
        # Auto Cancel Policy 参数
        autoCancel:
          maxAgeMs: 8000             # 更长订单存活时间
          priceDeviation: 3.0
          cancelOnStateChange: true
          cancelOnInventoryLimit: true
          inventoryLimitCooldownMs: 2000
        
        # 跨期价差套利（激进：启用）
        spreadArbitrage:
          enabled: true
          enhanceMarketMaking: true
          maxPosition: 30.0
          entryZScore: 1.5           # 更低的入场阈值
          exitZScore: 0.3
          windowSize: 200
        
        # 异步套利执行器
        asyncExecutor:
          signalIntervalUs: 5000
          maxWaitUs: 10000
          ticksPerSignal: 5
          tickQueueSize: 1024
          orderQueueSize: 256
        
        # 自成交防护
        selfTradePrevention:
          enabled: true
          strategy: cancelMM
          minPriceGap: 1.0
          allowSamePrice: false
          priceAdjustTicks: 1.0