# WtUftRunner 期货做市策略配置
# 使用 WtUftRunner 启动期货高频做市策略 (GLFT+Alpha框架)
#
# 启动方式: ./WtUftRunner ./config.yaml

# ============================================================
# 基础数据文件
# ============================================================
basefiles:
  session: ./common/sessions.json
  commodity: ./common/commodities.json
  contract: ./common/contracts.json
  holiday: ./common/holidays.json

# ============================================================
# 参数热更新配置 (ShareManager)
# ============================================================
# 启用后，可通过外部进程修改共享内存中的参数
# 框架自动检测参数变化并触发 on_params_updated 回调
share_domain:
  module: ./WtShareHelper.so    # 共享内存模块
  name: futu_mm                 # 共享内存域名 (生成 futu_mm.share 文件)

# ============================================================
# 行情源配置
# ============================================================
parsers:
  - active: true
    id: parser_ctp
    module: ParserCTP.so
    front: tcp://180.168.146.187:10211
    userid: "000000"
    password: "888888"
    brokerid: "9999"

# ============================================================
# 交易通道配置
# ============================================================
traders:
  - active: true
    id: trader_ctp
    module: TraderCTP.so
    front: tcp://180.168.146.187:10201
    userid: "000000"
    password: "888888"
    brokerid: "9999"

# ============================================================
# 策略配置 - UFT 做市策略
# ============================================================
strategies:
  uft:
    - active: true
      id: futu_mm_if
      name: FutuMM
      trader: trader_ctp
      params:
        # ============================================================
        # 合约配置
        # ============================================================
        anchorCode: CFFEX.IF2503       # 锚定合约（用于对冲）
        contracts:
          - code: CFFEX.IF2503
            # multiplier/tickSize 可选，未配置时从基础数据获取
            maxPosition: 50             # 单合约最大持仓 (手)
            maxDelta: 30                # 单合约最大 Delta
          - code: CFFEX.IF2506
            maxPosition: 30
            maxDelta: 20
        
        # ============================================================
        # 组合风险参数
        # ============================================================
        deltaLimit: 50.0                # Delta阈值(触发价差扩大)
        maxDelta: 100.0                 # 最大Delta(硬限制)
        maxExposure: 300.0              # 最大暴露
        hedgeThreshold: 30.0            # 对冲触发阈值
        hedgeRatio: 0.5                 # 对冲比例
        targetInventory: 0              # 目标库存
        maxSpreadMult: 3.0              # 风险时最大价差倍数
        maxDailyLoss: -50000.0          # 最大日内亏损
        
        # ============================================================
        # 报价参数
        # ============================================================
        numLevels: 3                    # 每边档位数
        baseSpread: 2.0                 # 基础价差 (tick)
        baseQty: 1.0                    # 基础量 (手)
        qtyDecay: 0.7                   # 外层衰减
        levelStep: 1.0                  # 档位间距 (tick)
        maxInventory: 100.0             # 最大库存
        skewFactor: 0.01                # GLFT φ系数 (库存惩罚系数)
        maxSkew: 5.0                    # 最大倾斜 (tick)
        
        # ============================================================
        # Sticky 策略参数 (减少频繁撤单重报)
        # 不对称粘性：改善价格(更激进)容忍更大，撤退(更保守)更敏感
        # ============================================================
        stickyThreshold: 1.0            # 价格粘性阈值 (tick)
        improveRetreatRatio: 2.0        # 改善/撤退容忍比 (改善侧阈值=stickyThreshold*ratio)
        maxPriceDeviation: 20.0         # 最大价格偏离(tick) - 防止计算错误
        
        # 增强 Skew 参数 (更激进的库存回归)
        skewSensitivity: 2.0            # Skew 非线性增强系数
        aggressiveSkewThreshold: 0.5    # 激进 Skew 触发阈值 (delta利用率)
        oneSidedThreshold: 0.8          # 单向报价阈值 (delta利用率)
        
        # ============================================================
        # 下单错误处理
        # ============================================================
        orderErrorThreshold: 3          # 触发暂停的连续下单错误次数
        
        # ============================================================
        # 收盘前平仓 (收盘时间从基础数据自动获取)
        # ============================================================
        closeoutMinutesBefore: 5         # 收盘前多少分钟停止报价 (0=不启用)
        closeoutFlattenPosition: true    # 收盘前是否平掉所有敞口
        
        # ============================================================
        # 模块开关 (已迁移至 coordinator.yaml)
        # 新架构使用 SignalAggregator 替代 AlphaEngine
        # ============================================================
        modules:
          useMarketMaking: true
          useSpreadArbitrage: false
        
        # ============================================================
        # GLFT SpreadOptimizer 参数 (含市场状态检测)
        # ============================================================
        spreadOptimizer:
          volSensitivity: 1.0           # 波动率敏感度
          depthSensitivity: 0.5         # 深度敏感度
          volWindow: 100                # 波动率窗口
          minSpreadMult: 0.5            # 最小价差倍数
          phi: 0.01                     # 库存惩罚系数
          portfolioSkewWeight: 0.5      # 组合级倾斜权重
          minCorrelation: 0.5           # 最小相关系数阈值
          
          # 市场状态检测 (融合自 MarketStateDetector)
          # FAST_MOVE → should_hedge=true (暂停报价+撤单)
          # ELEVATED_VOL → should_widen=true (扩宽价差)
          # LOW_LIQUIDITY → should_widen=true (扩宽价差)
          marketState:
            volThreshold: 0.003         # 波动率阈值 (ELEVATED_VOL)
            moveThreshold: 0.005        # 价格变动阈值 (FAST_MOVE)
            spreadThreshold: 5.0        # 价差阈值/tick (LOW_LIQUIDITY)
            volumeThreshold: 10.0       # 最小量阈值 (LOW_LIQUIDITY)
            cooldownTicks: 20           # 状态切换冷却ticks
        
        # ============================================================
        # Toxicity Detector 参数
        # ============================================================
        toxicityDetector:
          vpinThreshold: 0.7            # VPIN阈值
          window: 50                    # 计算窗口
          cooloffMs: 5000               # 熔断冷却时间(ms)
          adverseThreshold: 0.6         # 逆向选择阈值
          lookbackTrades: 100           # 回看成交数
          priceFollowWindow: 10         # 成交后价格跟踪窗口
          largeTradeMultiplier: 3.0     # 大单判定倍数
        
        # ============================================================
        # Synthetic Transaction 参数 (针对无逐笔成交的市场)
        # 国内期货市场不推送逐笔成交明细，使用综合信号替代
        # ============================================================
        syntheticTransaction:
          enabled: true                 # 启用综合推断信号
          tickWeight: 0.4               # Tick推断权重
          bookWeight: 0.4               # 订单簿权重
          selfTradeWeight: 0.2          # 自身成交校准权重
          minSamples: 5                 # 最小样本数(自身成交)
          # TickTransactionInferer 参数
          imbalanceWindowMs: 5000       # 失衡计算窗口(ms)
          largeTradeThreshold: 50.0     # 大单判定阈值
          minConfidence: 0.3            # 最小置信度
          # SelfTradeCalibrator 参数
          lookbackTrades: 50            # 回看成交数
          toxicityWindowMs: 5000        # 毒性计算窗口(ms)
          adverseThreshold: 0.6         # 逆向选择阈值
          # 信号融合说明:
          # - tickWeight: 从Tick快照推断交易方向的权重
          # - bookWeight: 订单簿深度不平衡信号的权重
          # - selfTradeWeight: 自身成交作为Ground Truth的校准权重
          # - 权重总和应为1.0，系统会自动归一化
          # - 自适应模式下权重会根据市场状态动态调整
        
        # ============================================================
        # Market State Detector 参数
        # ============================================================
        marketState:
          volThreshold: 0.003           # 波动率阈值
          moveThreshold: 0.005          # 价格变动阈值
          spreadThreshold: 5.0          # 价差阈值(tick)
          volumeThreshold: 10.0         # 成交量阈值
          lookbackTicks: 50             # 回看tick数
          cooldownTicks: 20             # 冷却tick数
        
        # ============================================================
        # Auto Cancel Policy 参数
        # ============================================================
        autoCancel:
          maxAgeMs: 5000                # 订单最大存活(ms)
          priceDeviation: 3.0           # 价格偏离阈值(tick)
          checkIntervalMs: 100          # 撤单检查间隔(ms)
          cancelOnStateChange: true     # 状态变化撤单
          cancelOnInventoryLimit: true   # 库存限制撤单
          inventoryLimitCooldownMs: 2000  # 库存限制撤单冷却期(ms)
        
        # ============================================================
        # Risk Monitor 参数
        # ============================================================
        riskMonitor:
          maxOrdersPerSec: 50           # 每秒最大下单
          maxCancelsPerSec: 30          # 每秒最大撤单
          maxTradesPerSec: 20           # 每秒最大成交
          cooldownMs: 30000            # 风险触发后冷却期(ms)
          checkIntervalMs: 5000         # 恢复检查间隔(ms)
          recoveryThreshold: 0.8        # 恢复阈值 (利用率)
        
        # ============================================================
        # Correlation Manager 参数 (跨合约组合级库存偏移)
        # ============================================================
        correlationManager:
          windowSize: 100               # 相关性计算窗口
          minCorrelation: 0.5           # 最小相关系数
          spreadZThreshold: 2.0         # 价差Z分数阈值

        # ============================================================
        # Adaptive Param Manager 参数 (自适应参数调整)
        # ============================================================
        adaptiveParam:
          updateInterval: 100           # 参数更新间隔(ticks)
          learningRate: 0.01            # 学习率
          minPhi: 0.001                 # 最小库存惩罚
          maxPhi: 0.1                   # 最大库存惩罚

        # ============================================================
        # Performance Analyzer 参数 (绩效分析)
        # ============================================================
        performanceAnalyzer:
          windowSize: 100               # 分析窗口
          sharpeRiskFree: 0.0           # 无风险利率

        # ============================================================
        # Performance Monitor 参数 (性能监控)
        # ============================================================
        performanceMonitor:
          latencyThreshold: 100000      # 延迟阈值(ns)

        # ============================================================
        # 跨期价差套利模块
        # ============================================================
        spreadArbitrage:
          enabled: true                 # 启用套利模块
          enhanceMarketMaking: true     # 做市增强 (价差信号影响报价)
          maxPosition: 20.0             # 单对最大仓位
          entryZScore: 2.0              # 入场 Z-Score 阈值
          exitZScore: 0.5               # 离场 Z-Score 阈值
          stopLossZ: 4.0                # 止损 Z-Score 阈值
          windowSize: 200               # 价差统计窗口
          convergenceTimeout: 3600      # 收敛超时时间(秒)
          minCorrelation: 0.7           # 最小相关系数
          pauseZThreshold: 3.0         # 报价暂停Z阈值
          signalIntervalMs: 100         # 信号生成间隔(ms)
          # 价差对通过 API 动态添加 (addSpreadPair)
          # 示例: IF_2503_2506 (近月-远月)

        # ============================================================
        # 异步套利执行器
        # ============================================================
        asyncExecutor:
          signalIntervalUs: 5000        # 信号检查间隔 (微秒)
          maxWaitUs: 10000              # 最大等待时间 (微秒)
          ticksPerSignal: 5             # 每 N 个 tick 检查一次信号
          tickQueueSize: 1024           # Tick队列大小
          orderQueueSize: 256           # 订单队列大小
          # 线程模型: 主线程做市, 独立线程套利
          # 延迟: 高频行情 < 100μs, 低频行情 < 10ms

        # ============================================================
        # 自成交防护
        # ============================================================
        selfTradePrevention:
          enabled: true                 # 启用自成交防护
          strategy: cancelMM            # 防护策略: cancelMM/adjustPrice/reject
          # cancelMM: 先撤销冲突做市单, 再执行套利单
          # adjustPrice: 调整套利单价格避开做市挂单
          # reject: 拒绝套利单
          minPriceGap: 1.0              # 最小价格间隔 (tick)
          allowSamePrice: false         # 是否允许同价位挂单
          priceAdjustTicks: 1.0         # 价格调整档位 (adjustPrice策略)

# ============================================================
# 开平仓策略文件
# ============================================================
bspolicy: ./common/actpolicy.json