# ============================================================
# 自动撤单模块配置
# 包含：订单超时、价格偏离、状态变化撤单
# ============================================================

maxAgeMs: 5000                  # 订单最大存活时间 (毫秒)
priceDeviation: 3.0             # 价格偏离阈值 (tick)
cancelOnStateChange: true       # 市场状态变化时撤单
cancelOnInventoryLimit: true    # 库存限制时撤单
inventoryLimitCooldownMs: 2000  # 库存限制撤单冷却期 (毫秒)